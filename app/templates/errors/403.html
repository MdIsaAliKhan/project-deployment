<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied — UniLMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#F4F6F9;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:52px 44px;max-width:460px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.1)}
    .err-code{font-size:5rem;font-weight:800;color:#E5E7EB;line-height:1;margin-bottom:6px}
    h1{font-size:1.35rem;font-weight:700;color:#111827;margin-bottom:10px}
    p{color:#4B5563;font-size:.9rem;line-height:1.6;margin-bottom:28px}
    .btn{display:inline-block;background:#2563EB;color:#fff;padding:10px 24px;border-radius:8px;font-weight:600;font-size:.875rem;text-decoration:none}
    .badge{display:inline-block;background:#FFFBEB;color:#D97706;border:1px solid #FDE68A;border-radius:20px;padding:4px 12px;font-size:.72rem;font-weight:600;margin-bottom:20px}
  </style>
</head>
<body>
  <div class="card">
    <div class="err-code">403</div>
    <div class="badge">Access Denied</div>
    <h1>You don't have permission to access this page.</h1>
    <p>This area is restricted. Please sign in with an authorized account, or contact your administrator if you believe this is an error.</p>
    <a href="/login" class="btn">← Sign In</a>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Error — UniLMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#F4F6F9;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#fff;border:1px solid #E5E7EB;border-radius:16px;padding:52px 44px;max-width:460px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.1)}
    .err-icon{font-size:3.5rem;margin-bottom:12px}
    h1{font-size:1.35rem;font-weight:700;color:#111827;margin-bottom:10px}
    p{color:#4B5563;font-size:.9rem;line-height:1.6;margin-bottom:28px}
    .btn{display:inline-block;background:#2563EB;color:#fff;padding:10px 24px;border-radius:8px;font-weight:600;font-size:.875rem;text-decoration:none}
    .badge{display:inline-block;background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;border-radius:20px;padding:4px 12px;font-size:.72rem;font-weight:600;margin-bottom:20px}
    .contact{margin-top:20px;font-size:.78rem;color:#9CA3AF}
  </style>
</head>
<body>
  <div class="card">
    <div class="err-icon">⚙️</div>
    <div class="badge">500 Internal Server Error</div>
    <h1>Something went wrong.</h1>
    <p>We encountered an unexpected error while processing your request. Our team has been notified. Please try again in a moment.</p>
    <a href="/" class="btn">← Return to Home</a>
    <div class="contact">If the issue persists, please contact the system administrator.</div>
  </div>
</body>
</html>

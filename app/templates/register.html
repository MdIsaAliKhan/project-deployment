<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - UniLMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="display:block">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">&#127891;</div>
      <div>
        <div class="logo-name">UniLMS</div>
        <div class="logo-sub">University Learning Portal</div>
      </div>
    </div>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Fill in your details to register.</p>

    {% if error %}
    <div class="alert alert-error mb-3">&#9888; {{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.register') }}">
      <input type="hidden" name="role" value="student">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-control" placeholder="Your full name" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@university.edu" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Minimum 6 characters" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:4px">
        Create Account
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:.83rem;color:var(--text2)">
      Already have an account?
      <a href="{{ url_for('auth.login') }}" style="color:var(--accent);font-weight:600">Sign in</a>
    </p>
  </div>
</div>
</body>
</html>

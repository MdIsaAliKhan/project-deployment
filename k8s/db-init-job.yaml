apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: lms
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: mysql-client
          image: mysql:8.0
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "Connecting to MySQL at $MYSQL_HOST..."
              mysql --ssl-mode=REQUIRED --force -h "$MYSQL_HOST" -u "$MYSQL_USER" -p"$MYSQL_PASSWORD" -e "CREATE DATABASE IF NOT EXISTS online_exam CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
              
              echo "Importing base schema..."
              mysql --ssl-mode=REQUIRED --force -h "$MYSQL_HOST" -u "$MYSQL_USER" -p"$MYSQL_PASSWORD" online_exam < /scripts/schema.sql
              
              if [ -f /scripts/migrate_tab_switches.sql ]; then
                echo "Importing tab switches migration..."
                mysql --ssl-mode=REQUIRED --force -h "$MYSQL_HOST" -u "$MYSQL_USER" -p"$MYSQL_PASSWORD" online_exam < /scripts/migrate_tab_switches.sql
              fi
              
              echo "Database initialization completed successfully!"
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: MYSQL_HOST
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lms-secret
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: scripts-vol
              mountPath: /scripts
      volumes:
        - name: scripts-vol
          configMap:
            name: db-scripts

apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-app
  namespace: lms
  labels:
    app: lms-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lms-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # zero-downtime deployments
  template:
    metadata:
      labels:
        app: lms-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "5000"
        prometheus.io/path:   "/metrics"
    spec:
      # Graceful shutdown — allow in-flight requests to complete
      terminationGracePeriodSeconds: 30

      containers:
        - name: lms-app
          # CI/CD pipeline replaces PLACEHOLDER_ECR_IMAGE automatically
          image: PLACEHOLDER_ECR_IMAGE
          imagePullPolicy: Always
          ports:
            - containerPort: 5000

          env:
            # ── Non-sensitive config from ConfigMap ──────────────────────
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: MYSQL_HOST
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: MYSQL_USER
            - name: MYSQL_DB
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: MYSQL_DB
            - name: FLASK_ENV
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: FLASK_ENV
            - name: MYSQL_SSL
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: MYSQL_SSL

            # ── Sensitive values from Secret ─────────────────────────────
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lms-secret
                  key: MYSQL_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lms-secret
                  key: SECRET_KEY

          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"

          # Liveness — restart pod if app is truly dead
          livenessProbe:
            httpGet:
              path: /login
              port: 5000
            initialDelaySeconds: 40
            periodSeconds:       20
            failureThreshold:    3
            timeoutSeconds:      5

          # Readiness — only send traffic when pod is ready
          readinessProbe:
            httpGet:
              path: /login
              port: 5000
            initialDelaySeconds: 20
            periodSeconds:       10
            failureThreshold:    3
            timeoutSeconds:      5

          # Startup probe — extra time for face_recognition to load
          startupProbe:
            httpGet:
              path: /login
              port: 5000
            initialDelaySeconds: 10
            periodSeconds:       5
            failureThreshold:    12   # 12 * 5s = 60s max startup time

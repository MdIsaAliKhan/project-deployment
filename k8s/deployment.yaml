apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-app
  namespace: lms
  labels:
    app: lms-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lms-app
  template:
    metadata:
      labels:
        app: lms-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port:   "5000"
        prometheus.io/path:   "/metrics"
    spec:
      containers:
        - name: lms-app
          # ── This placeholder is replaced automatically by the CI/CD pipeline ──
          # ── To deploy manually run: bash scripts/deploy.sh ──
          image: PLACEHOLDER_ECR_IMAGE
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: MYSQL_HOST
            - name: MYSQL_USER
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: MYSQL_USER
            - name: MYSQL_DB
              valueFrom:
                configMapKeyRef:
                  name: lms-config
                  key: MYSQL_DB
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lms-secret
                  key: MYSQL_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lms-secret
                  key: SECRET_KEY
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /login
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /login
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10

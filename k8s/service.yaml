apiVersion: v1
kind: Service
metadata:
  name: lms-service
  namespace: lms
  annotations:
    # AWS EKS will provision an ALB automatically
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
  labels:
    app: lms-app
spec:
  selector:
    app: lms-app
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 5000
  type: LoadBalancer
